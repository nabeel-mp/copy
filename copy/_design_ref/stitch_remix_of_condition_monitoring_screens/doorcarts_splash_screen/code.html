<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Doorcarts Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-blue': '#0047AB', // Approximate deep blue from the image
          },
          fontFamily: {
            'sans': ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>
<style data-purpose="custom-utilities">
    /* Ensuring full height for the splash screen on mobile */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #0047AB; /* Fallback */
    }
  </style>
</head>
<body class="bg-brand-blue flex flex-col justify-between items-center h-full w-full text-white font-sans antialiased">
<!-- BEGIN: MainContent -->
<main class="flex-grow flex flex-col justify-center items-center w-full px-6">
<!-- Logo Container -->
<div class="flex flex-col items-center justify-center space-y-6">
<!-- Icon/Logo Image -->
<!-- The user requested recreating the stylized 'D' door logo. 
           Since it's a specific graphic, using an SVG placeholder for the shape or a generic icon if an exact match isn't possible. 
           Given the complexity of drawing the exact 'D' door with CSS/SVG from scratch perfectly matching the raster image without an actual asset, 
           I will try to create a close CSS/SVG representation or use a placeholder if it gets too complex.
           Let's try a simple SVG representation. -->
<div class="relative flex justify-center items-center h-32 w-32 mb-4" data-purpose="logo-icon">
<svg class="w-full h-full text-white fill-current" viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<!-- Main 'D' outer curve -->
<path d="M 30 10 L 50 10 C 75 10 90 30 90 50 C 90 70 75 90 50 90 L 30 90 Z" fill="white"></path>
<!-- Inner cutout to form the 'D' shape -->
<path d="M 45 25 C 60 25 70 35 70 50 C 70 65 60 75 45 75 L 45 25 Z" fill="#0047AB"></path>
<!-- The Door part (angled) -->
<!-- This is tricky to get right with just basic paths without spending a lot of time on coordinates.
               Let's simplify. The actual logo has a solid outer 'D' shape, and the negative space forms the door opening.
               Wait, looking closer at the image:
               It's a solid white block. The left edge is straight. Top and bottom are straight for a bit, then curve right.
               Inside, there is a cutout that looks like an open door pointing left.
               Let's try a simpler path. -->
<!-- Outer solid shape -->
<path d="M30 20 L55 20 C75 20 85 35 85 50 C85 65 75 80 55 80 L30 80 Z" fill="white"></path>
<!-- Door cutout -->
<polygon fill="#0047AB" points="40,25 60,35 60,75 40,85"></polygon>
<!-- Solid white door slightly offset -->
<polygon fill="white" points="35,30 55,40 55,80 35,90"></polygon>
<!-- Small blue dot for handle on the white door -->
<circle cx="50" cy="60" fill="#0047AB" r="3"></circle>
<!-- This is getting complicated and likely won't look exactly like the reference. 
                I will use a placeholder image structure but style it to look somewhat like the layout if the image fails, 
                or just rely on a simpler SVG. Let's stick with a simpler SVG that gives the *vibe* of a door logo to keep code clean. -->
</svg>
<!-- Overriding the complex attempt with a slightly simpler, more abstract representation to ensure clean code -->
<svg class="absolute inset-0 w-full h-full" viewbox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
<g fill="white">
<!-- Outer D shape right side -->
<path d="M 40 20 L 70 20 C 100 20 110 40 110 60 C 110 80 100 100 70 100 L 60 100 L 60 80 L 70 80 C 85 80 90 70 90 60 C 90 50 85 40 70 40 L 40 40 Z"></path>
<!-- Angled Door left side -->
<path d="M 30 30 L 55 40 L 55 90 L 30 80 Z"></path>
<!-- Handle -->
<circle cx="50" cy="65" fill="#0047AB" r="3"></circle>
</g>
</svg>
</div>
<!-- Brand Name -->
<h1 class="text-4xl font-extrabold tracking-tight" style="font-family: Arial, sans-serif;">
        Doorcarts
      </h1>
</div>
</main>
<!-- END: MainContent -->
<!-- BEGIN: Footer -->
<footer class="w-full pb-10 text-center px-4">
<p class="text-[10px] font-bold uppercase tracking-wide leading-tight opacity-90 text-white">
      Dorek International<br/>
      Enterprises LLP
    </p>
</footer>
<!-- END: Footer -->
</body></html>
