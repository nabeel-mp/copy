<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col font-body-lg">
<!-- Top App Bar (Transactional variant - Nav suppressed) -->

<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95 text-on-surface">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<div class="font-headline-sm text-headline-sm text-on-surface flex-1 text-center font-bold">Verification</div>
<div class="w-10 h-10 flex items-center justify-center">
<!-- Empty div for flex spacing to keep title centered -->
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-container-padding pt-stack-md pb-safe">
<!-- Brand / Graphic Anchor -->
<div class="flex justify-center mb-8 mt-4">
<div class="w-20 h-20 bg-primary-container rounded-2xl flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-[40px] text-primary" style="font-variation-settings: 'FILL' 1;">mark_email_read</span>
</div>
</div>
<!-- Header Text -->
<div class="text-center mb-stack-md">
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Verify your number</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                Enter the 4-digit code sent to your mobile number<br/>
<strong class="text-on-surface mt-1 block">+91 98765 43210</strong>
</p>
</div>
<!-- OTP Input Form -->
<form class="flex flex-col flex-1 w-full max-w-md mx-auto" onsubmit="event.preventDefault(); window.location.href='#';">
<div class="flex justify-center gap-4 mb-stack-md">
<input autofocus="" class="otp-input w-16 h-16 text-center font-headline-md text-headline-md bg-surface-container-lowest border border-outline-variant rounded-xl text-on-surface transition-all" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="number"/>
<input class="otp-input w-16 h-16 text-center font-headline-md text-headline-md bg-surface-container-lowest border border-outline-variant rounded-xl text-on-surface transition-all" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="number"/>
<input class="otp-input w-16 h-16 text-center font-headline-md text-headline-md bg-surface-container-lowest border border-outline-variant rounded-xl text-on-surface transition-all" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="number"/>
<input class="otp-input w-16 h-16 text-center font-headline-md text-headline-md bg-surface-container-lowest border border-outline-variant rounded-xl text-on-surface transition-all" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="number"/>
</div>
<!-- Resend Logic -->
<div class="flex justify-center items-center gap-2 mb-8 font-body-sm text-body-sm">
<span class="text-on-surface-variant">Didn't receive the code?</span>
<button class="text-primary font-bold hover:text-primary-fixed-variant transition-colors" id="resendBtn" type="button">Resend (00:30)</button>
</div>
<!-- Spacer to push button to bottom on mobile if needed, though here we just keep it in flow -->
<div class="mt-auto pt-8 pb-4">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-label-md text-label-md flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-sm hover:bg-primary/90" type="submit">
                    Verify &amp; Proceed
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</form>
</main>
<script>
        // Simple auto-focus next input logic for OTP
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }
                if (e.target.value !== '' && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Simple timer logic
        let timeLeft = 30;
        const resendBtn = document.getElementById('resendBtn');
        const timer = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timer);
                resendBtn.textContent = 'Resend Code';
                resendBtn.classList.remove('text-primary');
                resendBtn.classList.add('text-primary', 'cursor-pointer');
            } else {
                resendBtn.textContent = `Resend (00:${timeLeft.toString().padStart(2, '0')})`;
                resendBtn.classList.add('cursor-not-allowed', 'opacity-70');
            }
            timeLeft -= 1;
        }, 1000);
    </script>
